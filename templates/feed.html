{% extends 'base.html' %}

{% block content %}
<h2 style="margin-top: 0;">{{ title }}</h2>

<div class="video-grid" id="video-grid">
    <!-- JS will populate this -->
</div>

<div id="loader">Scroll down for more</div>

<script>
    let page = 1;
    let loading = false;
    const reqType = "{{ type }}";
    const reqQuery = "{{ query }}";
    
    const CONCURRENT_WORKERS = {{ app_settings.concurrent_requests }};
    const MIN_DELAY = {{ app_settings.min_delay_ms }};
    
    function fetchListAndProcess(p) {
        loading = true;
        document.getElementById('loader').innerText = 'Loading list...';
        
        fetch(`/api/videos_list?type=${reqType}&query=${encodeURIComponent(reqQuery)}&page=${p}`)
            .then(r => r.json())
            .then(list => {
                if(list && list.length > 0) {
                    document.getElementById('loader').innerText = 'Processing videos...';
                    
                    const grid = document.getElementById('video-grid');
                    const placeholders = [];
                    
                    list.forEach(vid => {
                        const div = document.createElement('div');
                        div.className = 'video-card';
                        div.style.aspectRatio = '16/9';
                        div.style.background = '#222';
                        div.style.borderRadius = '12px';
                        div.style.display = 'flex';
                        div.style.alignItems = 'center';
                        div.style.justifyContent = 'center';
                        div.style.color = '#888';
                        div.style.fontWeight = 'bold';
                        div.innerText = 'Loading...';
                        grid.appendChild(div);
                        placeholders.push({ div, vid });
                    });
                    
                    let currentIndex = 0;
                    let completed = 0;
                    
                    const worker = async () => {
                        while (currentIndex < placeholders.length) {
                            const index = currentIndex++;
                            const item = placeholders[index];
                            const vidUrl = item.vid.url || `https://www.youtube.com/watch?v=${item.vid.id}`;
                            
                            const qs = new URLSearchParams({
                                url: vidUrl,
                                channel_name: item.vid.channel_name || '',
                                channel_icon: item.vid.channel_icon || '',
                                channel_url: item.vid.channel_url || ''
                            });
                            
                            try {
                                const res = await fetch(`/api/video_card?${qs.toString()}`);
                                const html = await res.text();
                                if(html.trim() !== '') {
                                    item.div.outerHTML = html;
                                } else {
                                    item.div.remove();
                                }
                            } catch (e) {
                                item.div.remove();
                            }
                            
                            completed++;
                            
                            // Check for final item
                            if (completed >= placeholders.length) {
                                loading = false;
                                document.getElementById('loader').innerText = 'Scroll down for more';
                                
                                // Fix infinite scroll stuck if window height is larger than loaded content
                                setTimeout(() => {
                                    if (!loading) {
                                        const rect = document.getElementById('loader').getBoundingClientRect();
                                        if (rect.top <= window.innerHeight + 200) {
                                            fetchListAndProcess(page);
                                            page++;
                                        }
                                    }
                                }, 100);

                            } else if (MIN_DELAY > 0) {
                                await new Promise(r => setTimeout(r, MIN_DELAY));
                            }
                        }
                    };
                    
                    // Spawn workers up to the max concurrent limit or list length
                    for (let i = 0; i < Math.min(CONCURRENT_WORKERS, placeholders.length); i++) {
                        worker();
                    }
                    
                } else {
                    document.getElementById('loader').innerText = "No more videos";
                    loading = true; // Keep loading true to prevent further fetch attempts
                }
            })
            .catch(err => {
                loading = false;
                document.getElementById('loader').innerText = "Error loading videos. Scroll to retry.";
            });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !loading) {
            fetchListAndProcess(page);
            page++;
        }
    }, { rootMargin: "200px" });

    observer.observe(document.getElementById('loader'));
</script>
{% endblock %}
