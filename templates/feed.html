{% extends 'base.html' %}

{% block content %}
<h2 style="margin-top: 0;">{{ title }}</h2>

<div class="video-grid" id="video-grid">
    <!-- JS will populate this -->
</div>

<div id="loader">Scroll down for more</div>

<script>
(function() {
    let page = 1;
    let loading = false;
    const reqType = "{{ type }}";
    const reqQuery = "{{ query }}";
    
    function revealStaggered() {
        const unrevealed = document.querySelectorAll('.unrevealed');
        unrevealed.forEach((card, index) => {
            setTimeout(() => {
                if (window.pageAbortController && window.pageAbortController.signal.aborted) return;
                card.classList.remove('unrevealed');
                card.classList.add('reveal-anim');
            }, index * 80);
        });
    }
    
    function loadVideos() {
        loading = true;
        document.getElementById('loader').innerText = 'Loading videos...';
        
        window.appFetch(`/api/videos?type=${reqType}&query=${encodeURIComponent(reqQuery)}&page=${page}`)
            .then(r => r.text())
            .then(html => {
                if(html.trim() !== '') {
                    document.getElementById('video-grid').insertAdjacentHTML('beforeend', html);
                    revealStaggered();
                    loading = false;
                    document.getElementById('loader').innerText = 'Scroll down for more';
                    
                    setTimeout(() => {
                        if (!loading && !window.pageAbortController.signal.aborted) {
                            const rect = document.getElementById('loader').getBoundingClientRect();
                            if (rect.top <= window.innerHeight + 200) {
                                page++;
                                loadVideos();
                            }
                        }
                    }, 100);
                } else {
                    document.getElementById('loader').style.display = "none";
                    const endCard = `
                    <div class="video-card unrevealed" style="cursor: default;">
                        <div class="thumbnail" style="background: transparent; border: 2px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <img src="/static/icons/no-more.svg" style="width: 48px; height: 48px; margin-bottom: 8px;" alt="No more">
                            <span style="color: #555; font-weight: bold; font-size: 1.1rem;">No more videos</span>
                        </div>
                    </div>`;
                    document.getElementById('video-grid').insertAdjacentHTML('beforeend', endCard);
                    revealStaggered();
                    loading = true; 
                }
            })
            .catch(err => {
                if (err.name === 'AbortError') return;
                loading = false;
                document.getElementById('loader').innerText = "Error loading videos. Scroll to retry.";
            });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !loading) {
            loadVideos();
            page++;
        }
    }, { rootMargin: "200px" });

    observer.observe(document.getElementById('loader'));

    window.pageTeardown = function() {
        observer.disconnect();
    };
})();
</script>
{% endblock %}
