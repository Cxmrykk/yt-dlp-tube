{% extends 'base.html' %}

{% block content %}
<h2 style="margin-top: 0;">{{ title }}</h2>

<div class="video-grid" id="video-grid">
    <div class="video-card" id="sentinel-card" style="opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">
        <div class="thumbnail skeleton-box"></div>
        <div class="video-info">
            <div class="skel-line skeleton-box title"></div>
            <div class="skel-row">
                <div class="channel-avatar skeleton-box skel-circle"></div>
                <div class="skel-col">
                    <div class="skel-line skeleton-box"></div>
                    <div class="skel-line skeleton-box short"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.FEED_CONFIG = {
        type: "{{ type }}",
        query: "{{ query | safe }}"
    };
</script>
<script src="/static/js/pages/feed.js"></script>
{% endblock %}
