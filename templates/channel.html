{% extends 'base.html' %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; background: var(--card-bg); padding: 30px; border-radius: 12px;">
    <div style="display: flex; align-items: center; gap: 20px;">
        <img src="{{ channel_icon or 'https://ui-avatars.com/api/?name='~channel_name~'&background=333&color=fff' }}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover;">
        <div>
            <h1 style="margin: 0 0 10px 0;">{{ channel_name }}</h1>
            <span style="color: var(--text-muted);">{{ url }}</span>
        </div>
    </div>
    
    <form action="/settings" method="POST" style="margin: 0;">
        <input type="hidden" name="url" value="{{ url }}">
        <input type="hidden" name="name" value="{{ channel_name }}">
        
        {% if is_subbed %}
            <input type="hidden" name="action" value="remove">
            <button type="submit" class="btn">Subscribed ✓</button>
        {% else %}
            <input type="hidden" name="action" value="add">
            <button type="submit" class="btn btn-danger">Subscribe</button>
        {% endif %}
    </form>
</div>

<div class="video-grid" id="video-grid">
    <!-- JS will populate this -->
</div>

<div id="loader">Scroll down for more</div>

<script>
    let page = 1;
    let loading = false;
    const reqType = "channel";
    const reqQuery = "{{ url }}";
    
    const CONCURRENT_WORKERS = {{ app_settings.concurrent_requests }};
    const MIN_DELAY = {{ app_settings.min_delay_ms }};
    
    function fetchListAndProcess(p) {
        loading = true;
        document.getElementById('loader').innerText = 'Loading list...';
        
        fetch(`/api/videos_list?type=${reqType}&query=${encodeURIComponent(reqQuery)}&page=${p}`)
            .then(r => r.json())
            .then(list => {
                if(list && list.length > 0) {
                    document.getElementById('loader').innerText = 'Processing videos...';
                    
                    const grid = document.getElementById('video-grid');
                    const placeholders = [];
                    
                    list.forEach(vid => {
                        const div = document.createElement('div');
                        div.className = 'video-card';
                        div.style.aspectRatio = '16/9';
                        div.style.background = '#222';
                        div.style.borderRadius = '12px';
                        div.style.display = 'flex';
                        div.style.alignItems = 'center';
                        div.style.justifyContent = 'center';
                        div.style.color = '#888';
                        div.style.fontWeight = 'bold';
                        div.innerText = 'Loading...';
                        grid.appendChild(div);
                        placeholders.push({ div, vid });
                    });
                    
                    let currentIndex = 0;
                    let completed = 0;
                    
                    const worker = async () => {
                        while (currentIndex < placeholders.length) {
                            const index = currentIndex++;
                            const item = placeholders[index];
                            const vidUrl = item.vid.url || `https://www.youtube.com/watch?v=${item.vid.id}`;
                            
                            const qs = new URLSearchParams({
                                url: vidUrl,
                                channel_name: item.vid.channel_name || '',
                                channel_icon: item.vid.channel_icon || '',
                                channel_url: item.vid.channel_url || ''
                            });
                            
                            try {
                                const res = await fetch(`/api/video_card?${qs.toString()}`);
                                const html = await res.text();
                                if(html.trim() !== '') {
                                    item.div.outerHTML = html;
                                } else {
                                    item.div.remove();
                                }
                            } catch (e) {
                                item.div.remove();
                            }
                            
                            completed++;
                            
                            if (completed >= placeholders.length) {
                                loading = false;
                                document.getElementById('loader').innerText = 'Scroll down for more';
                                
                                // Auto-trigger next page if viewport is still empty
                                setTimeout(() => {
                                    if (!loading) {
                                        const rect = document.getElementById('loader').getBoundingClientRect();
                                        if (rect.top <= window.innerHeight + 200) {
                                            fetchListAndProcess(page);
                                            page++;
                                        }
                                    }
                                }, 100);

                            } else if (MIN_DELAY > 0) {
                                await new Promise(r => setTimeout(r, MIN_DELAY));
                            }
                        }
                    };
                    
                    // Spawn workers
                    for (let i = 0; i < Math.min(CONCURRENT_WORKERS, placeholders.length); i++) {
                        worker();
                    }
                    
                } else {
                    document.getElementById('loader').innerText = "No more videos";
                    loading = true; // Stop observer
                }
            })
            .catch(err => {
                loading = false;
                document.getElementById('loader').innerText = "Error loading videos. Scroll to retry.";
            });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !loading) {
            fetchListAndProcess(page);
            page++;
        }
    }, { rootMargin: "200px" });

    observer.observe(document.getElementById('loader'));
</script>
{% endblock %}
