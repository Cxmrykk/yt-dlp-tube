{% extends 'base.html' %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; background: var(--card-bg); padding: 30px; border-radius: 12px;">
    <div style="display: flex; align-items: center; gap: 20px;">
        <img id="ch-icon" src="{{ channel_icon or 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=' }}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #333;">
        <div>
            <h1 id="ch-name" style="margin: 0 0 10px 0;">{{ channel_name }}</h1>
            <span style="color: var(--text-muted);">{{ url }}</span>
        </div>
    </div>
    
    <form action="/settings" method="POST" style="margin: 0;">
        <input type="hidden" name="url" value="{{ url }}">
        <input type="hidden" id="form-ch-name" name="name" value="{{ channel_name }}">
        <input type="hidden" id="form-action" name="action" value="{{ 'remove' if is_subbed else 'add' }}">
        
        <button type="submit" id="sub-btn" class="btn {{ '' if is_subbed else 'btn-danger' }}" style="display: {{ 'block' if channel_name != 'Loading...' else 'none' }}">
            {{ 'Subscribed ✓' if is_subbed else 'Subscribe' }}
        </button>
    </form>
</div>

<div class="video-grid" id="video-grid">
    <!-- JS will populate this -->
</div>

<div id="loader">Scroll down for more</div>

<script>
    // 1. Hydrate Channel Header instantly if it's not cached in subs
    const needsFetch = {{ 'true' if needs_fetch else 'false' }};
    const chUrl = "{{ url }}";
    
    if (needsFetch) {
        fetch(`/api/channel_info?url=${encodeURIComponent(chUrl)}`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('ch-name').innerText = data.name;
                document.getElementById('form-ch-name').value = data.name;
                
                const fallbackAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=333&color=fff`;
                document.getElementById('ch-icon').src = data.icon || fallbackAvatar;
                
                const subBtn = document.getElementById('sub-btn');
                subBtn.style.display = 'block';
                
                if(data.is_subbed) {
                    document.getElementById('form-action').value = 'remove';
                    subBtn.className = 'btn';
                    subBtn.innerText = 'Subscribed ✓';
                } else {
                    document.getElementById('form-action').value = 'add';
                    subBtn.className = 'btn btn-danger';
                    subBtn.innerText = 'Subscribe';
                }
            });
    }

    // 2. Infinite scroll grid
    let page = 1;
    let loading = false;
    const reqType = "channel";
    
    function loadVideos() {
        loading = true;
        document.getElementById('loader').innerText = 'Loading videos...';
        
        fetch(`/api/videos?type=${reqType}&query=${encodeURIComponent(chUrl)}&page=${page}`)
            .then(r => r.text())
            .then(html => {
                if(html.trim() !== '') {
                    document.getElementById('video-grid').insertAdjacentHTML('beforeend', html);
                    loading = false;
                    document.getElementById('loader').innerText = 'Scroll down for more';
                    
                    // Auto-trigger next page if window height is larger than loaded content
                    setTimeout(() => {
                        if (!loading) {
                            const rect = document.getElementById('loader').getBoundingClientRect();
                            if (rect.top <= window.innerHeight + 200) {
                                page++;
                                loadVideos();
                            }
                        }
                    }, 100);
                } else {
                    document.getElementById('loader').innerText = "No more videos";
                    loading = true; // Stop observer
                }
            })
            .catch(err => {
                loading = false;
                document.getElementById('loader').innerText = "Error loading videos. Scroll to retry.";
            });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !loading) {
            loadVideos();
            page++;
        }
    }, { rootMargin: "200px" });

    observer.observe(document.getElementById('loader'));
</script>
{% endblock %}
