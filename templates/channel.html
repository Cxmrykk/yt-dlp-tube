{% extends 'base.html' %}

{% block content %}
<div style="display: flex; align-items: center; justify-content: space-between; margin-bottom: 30px; background: var(--card-bg); padding: 30px; border-radius: 12px; flex-wrap: wrap; gap: 15px;">
    <div style="display: flex; align-items: center; gap: 20px;">
        <img id="ch-icon" src="{{ (channel_icon | proxy_image) if channel_icon else 'data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=' }}" style="width: 100px; height: 100px; border-radius: 50%; object-fit: cover; background: #333;">
        <div>
            <h1 id="ch-name" style="margin: 0 0 5px 0;">{{ channel_name }}</h1>
            <div style="display: flex; gap: 15px; color: var(--text-muted); font-size: 0.95rem; margin-bottom: 5px;">
                <span id="ch-subs"></span>
                <span>{{ url }}</span>
            </div>
        </div>
    </div>
    <button id="sub-btn" class="btn" style="display: none;" onclick="toggleSubscribe()">Subscribe</button>
</div>

<div class="video-grid" id="video-grid">
    <!-- JS will populate this -->
</div>

<div id="loader">Scroll down for more</div>

<script>
    const needsFetch = {{ 'true' if needs_fetch else 'false' }};
    const chUrl = "{{ url }}";
    const checkIcon = `<img src="/static/icons/check.svg" style="width: 18px; height: 18px; margin-left: 4px;" alt="Subscribed">`;
    
    let currentChannel = { url: chUrl, name: "{{ channel_name }}", icon: "{{ channel_icon }}" };
    let isSubbed = {{ 'true' if is_subbed else 'false' }};

    function getImgProxyUrl(url) {
        if(!url) return '';
        if(url.startsWith('/proxy/') || url.startsWith('data:')) return url;
        return `/proxy/image?url=${encodeURIComponent(url)}`;
    }
    
    if (needsFetch) {
        fetch(`/api/channel_info?url=${encodeURIComponent(chUrl)}`)
            .then(r => r.json())
            .then(data => {
                document.getElementById('ch-name').innerText = data.name;
                if (data.subscriber_count) document.getElementById('ch-subs').innerText = data.subscriber_count + ' subscribers';
                currentChannel.name = data.name;
                
                const rawFallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.name)}&background=333&color=fff`;
                document.getElementById('ch-icon').src = getImgProxyUrl(data.icon || rawFallback);
                currentChannel.icon = data.icon || rawFallback;
                
                isSubbed = data.is_subbed;
                updateSubButton();
            });
    } else {
        updateSubButton();
        fetch(`/api/channel_info?url=${encodeURIComponent(chUrl)}`)
            .then(r => r.json())
            .then(data => { if (data.subscriber_count) document.getElementById('ch-subs').innerText = data.subscriber_count + ' subscribers'; });
    }

    function updateSubButton() {
        const btn = document.getElementById('sub-btn');
        btn.style.display = 'inline-flex';
        if (isSubbed) { btn.className = 'btn'; btn.innerHTML = 'Subscribed ' + checkIcon; } 
        else { btn.className = 'btn btn-danger'; btn.innerHTML = 'Subscribe'; }
    }

    function toggleSubscribe() {
        const btn = document.getElementById('sub-btn'); btn.innerHTML = 'Saving...';
        fetch('/api/toggle_sub', {
            method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(currentChannel)
        }).then(r => r.json()).then(res => { isSubbed = res.is_subbed; updateSubButton();
        }).catch(err => { alert("Error toggling subscription"); updateSubButton(); });
    }

    let page = 1; let loading = false; const reqType = "channel";
    
    function revealStaggered() {
        const unrevealed = document.querySelectorAll('.unrevealed');
        unrevealed.forEach((card, index) => {
            setTimeout(() => {
                card.classList.remove('unrevealed');
                card.classList.add('reveal-anim');
            }, index * 80);
        });
    }
    
    function loadVideos() {
        loading = true; document.getElementById('loader').innerText = 'Loading videos...';
        fetch(`/api/videos?type=${reqType}&query=${encodeURIComponent(chUrl)}&page=${page}`)
            .then(r => r.text())
            .then(html => {
                if(html.trim() !== '') {
                    document.getElementById('video-grid').insertAdjacentHTML('beforeend', html);
                    revealStaggered();
                    loading = false;
                    document.getElementById('loader').innerText = 'Scroll down for more';
                    setTimeout(() => {
                        if (!loading) {
                            const rect = document.getElementById('loader').getBoundingClientRect();
                            if (rect.top <= window.innerHeight + 200) { page++; loadVideos(); }
                        }
                    }, 100);
                } else { 
                    document.getElementById('loader').style.display = "none";
                    const endCard = `
                    <div class="video-card unrevealed" style="cursor: default;">
                        <div class="thumbnail" style="background: transparent; border: 2px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <img src="/static/icons/no-more.svg" style="width: 48px; height: 48px; margin-bottom: 8px;" alt="No more">
                            <span style="color: #555; font-weight: bold; font-size: 1.1rem;">No more videos</span>
                        </div>
                    </div>`;
                    document.getElementById('video-grid').insertAdjacentHTML('beforeend', endCard);
                    revealStaggered();
                    loading = true; 
                }
            }).catch(err => { loading = false; document.getElementById('loader').innerText = "Error loading videos. Scroll to retry."; });
    }

    const observer = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !loading) { loadVideos(); page++; }
    }, { rootMargin: "200px" });

    observer.observe(document.getElementById('loader'));
</script>
{% endblock %}
