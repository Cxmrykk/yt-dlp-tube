<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - yt-dlp Tube</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <style>
        :root {
            --bg-color: #0f0f0f;
            --text-color: #ffffff;
            --text-muted: #aaaaaa;
            --accent: #ff0000;
            --card-bg: #1a1a1a;
        }
        body {
            margin: 0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color); color: var(--text-color);
            display: flex; align-items: center; justify-content: center;
            height: 100vh;
        }
        .login-box {
            background: var(--card-bg); padding: 40px; border-radius: 12px;
            width: 100%; max-width: 380px; text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }
        .login-box h1 { margin-top: 0; margin-bottom: 25px; display: flex; align-items: center; justify-content: center; gap: 10px; font-size: 1.6rem; }
        .login-box input {
            box-sizing: border-box; width: 100%; padding: 12px 15px; margin-bottom: 20px;
            background: #111; color: white; border: 1px solid #444; border-radius: 6px; font-size: 1rem;
        }
        .btn {
            background: var(--text-color); color: var(--bg-color);
            padding: 12px 24px; border: none; border-radius: 6px; cursor: pointer;
            font-weight: bold; font-size: 1rem; width: 100%; transition: background 0.2s;
        }
        .btn:hover { background: #ddd; }
        .error { color: #ff4a4a; margin-bottom: 20px; font-weight: 600; font-size: 0.95rem; }
    </style>
</head>
<body>
    <div class="login-box">
        <h1>
            <img src="/static/icons/logo.svg" style="width: 28px; height: 28px;" alt="Logo">
            yt-dlp Tube
        </h1>
        <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem;">Enter your server's secret key to securely access the interface.</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login" id="loginForm">
            <input type="password" name="secret_key" placeholder="Enter Secret Key..." required autofocus>
            <button type="submit" class="btn">Authenticate</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const secretInput = document.querySelector('input[name="secret_key"]');
            const form = document.getElementById('loginForm');
            const errorDiv = document.querySelector('.error');
            
            if (errorDiv) {
                localStorage.removeItem('secret_key');
            } else {
                const storedKey = localStorage.getItem('secret_key');
                if (storedKey) {
                    secretInput.value = storedKey;
                    form.style.display = 'none';
                    
                    const loadingP = document.createElement('p');
                    loadingP.style.color = "var(--text-muted)";
                    loadingP.innerText = "Authenticating automatically...";
                    form.parentNode.appendChild(loadingP);
                    
                    form.submit();
                }
            }

            form.addEventListener('submit', function() {
                if (secretInput.value.trim() !== '') {
                    localStorage.setItem('secret_key', secretInput.value.trim());
                }
            });
        });
    </script>
</body>
</html>
