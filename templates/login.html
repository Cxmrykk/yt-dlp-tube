<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - yt-dlp Tube</title>
    <link rel="icon" href="/static/favicon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="/static/css/main.css">
    <link rel="stylesheet" href="/static/css/pages/login.css">
</head>
<body class="login-page">
    <div class="login-box">
        <h1>
            <img src="/static/icons/logo.svg" style="width: 28px; height: 28px;" alt="Logo">
            yt-dlp Tube
        </h1>
        <p style="color: var(--text-muted); margin-bottom: 25px; font-size: 0.95rem;">Enter your server's secret key to securely access the interface.</p>
        
        {% if error %}
        <div class="error">{{ error }}</div>
        {% endif %}
        
        <form method="POST" action="/login" id="loginForm">
            <input type="password" name="secret_key" placeholder="Enter Secret Key..." required autofocus>
            <button type="submit" class="btn">Authenticate</button>
        </form>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const secretInput = document.querySelector('input[name="secret_key"]');
            const form = document.getElementById('loginForm');
            const errorDiv = document.querySelector('.error');
            
            if (errorDiv) {
                localStorage.removeItem('secret_key');
            } else {
                const storedKey = localStorage.getItem('secret_key');
                if (storedKey) {
                    secretInput.value = storedKey;
                    form.style.display = 'none';
                    
                    const loadingP = document.createElement('p');
                    loadingP.style.color = "var(--text-muted)";
                    loadingP.innerText = "Authenticating automatically...";
                    form.parentNode.appendChild(loadingP);
                    
                    form.submit();
                }
            }

            form.addEventListener('submit', function() {
                if (secretInput.value.trim() !== '') {
                    localStorage.setItem('secret_key', secretInput.value.trim());
                }
            });
        });
    </script>
</body>
</html>
