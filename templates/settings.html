{% extends 'base.html' %}

{% block content %}
<style>
    .sub-list { list-style: none; padding: 0; max-width: 700px;}
    .sub-item { display: flex; justify-content: space-between; align-items: center; background: var(--card-bg); padding: 15px; margin-bottom: 10px; border-radius: 8px;}
    .add-form { background: var(--card-bg); padding: 25px; border-radius: 8px; max-width: 650px; margin-bottom: 30px;}
    .add-form input { padding: 12px; width: calc(100% - 26px); margin-bottom: 15px; background: #111; color: white; border: 1px solid #444; border-radius: 6px; font-size: 1rem;}
</style>

<h2 style="margin-top: 0;">Settings & Subscriptions</h2>

<div class="add-form">
    <h3 style="margin-top: 0;">Add Channel via URL</h3>
    <form action="/settings" method="POST">
        <input type="hidden" name="action" value="add">
        <input type="text" name="url" placeholder="Channel URL (e.g. https://www.youtube.com/@mkbhd)" required>
        <button type="submit" class="btn btn-danger">Add Subscription</button>
    </form>
</div>

<h3>Your Subscriptions</h3>
<ul class="sub-list">
    {% for sub in subs %}
    <li class="sub-item">
        <div style="display: flex; align-items: center; gap: 15px;">
            <img src="{{ sub.icon or 'https://ui-avatars.com/api/?name='~sub.name~'&background=333&color=fff' }}" style="width: 45px; height: 45px; border-radius: 50%; object-fit: cover;">
            <div>
                <strong style="font-size: 1.1rem;">{{ sub.name }}</strong><br>
                <a href="/channel?url={{ sub.url }}" style="color: var(--text-muted); font-size: 0.9rem; text-decoration: none;">{{ sub.url }}</a>
            </div>
        </div>
        <form action="/settings" method="POST" style="margin: 0;">
            <input type="hidden" name="action" value="remove">
            <input type="hidden" name="url" value="{{ sub.url }}">
            <button type="submit" class="btn">Unsubscribe</button>
        </form>
    </li>
    {% else %}
    <p style="color: var(--text-muted);">No subscriptions yet. Try adding one above!</p>
    {% endfor %}
</ul>
{% endblock %}
