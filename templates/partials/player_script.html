<script>
(function() {
    window.APP_CONFIG = {
        overlayTimeout: {{ app_settings.overlay_timeout_ms | default(500) }},
        shortcuts: {
            pause: "{{ app_settings.shortcut_pause | default('Space') }}",
            seekFwd: "{{ app_settings.shortcut_seek_fwd | default('ArrowRight') }}",
            seekBwd: "{{ app_settings.shortcut_seek_bwd | default('ArrowLeft') }}",
            mute: "{{ app_settings.shortcut_mute | default('m') }}",
            cc: "{{ app_settings.shortcut_cc | default('v') }}",
            chapNext: "{{ app_settings.shortcut_chap_next | default('PageUp') }}",
            chapPrev: "{{ app_settings.shortcut_chap_prev | default('PageDown') }}",
            speedUp: "{{ app_settings.shortcut_speed_up | default('ArrowUp') }}",
            speedDown: "{{ app_settings.shortcut_speed_down | default('ArrowDown') }}"
        },
        ccSettings: {
            font: {{ app_settings.cc_font | tojson }},
            color: {{ app_settings.cc_color | tojson }},
            bg: {{ app_settings.cc_bg | tojson }},
            bg_op: parseFloat({{ app_settings.cc_bg_op | tojson }}),
            scale: parseFloat({{ app_settings.cc_scale | tojson }}),
            v_offset: parseFloat({{ app_settings.cc_v_offset | tojson }})
        },
        sbSettings: {
            enabled: {{ 'true' if app_settings.sb_enabled else 'false' }},
            action: "{{ app_settings.sb_action }}",
            categories: {{ app_settings.sb_categories | default([]) | tojson | safe }},
            colors: {{ app_settings.sb_colors | default({}) | tojson | safe }},
            userID: "{{ app_settings.sb_userid }}"
        }
    };

    const container = document.getElementById('videoContainer');
    if (container && typeof PlayerCore !== 'undefined') {
        window.ytPlayer = new PlayerCore(container);
    } else {
        console.error("PlayerCore class not found. Ensure JS files are loaded in base.html.");
    }
    
    window.initializePlayer = function(data) {
        if (window.ytPlayer) window.ytPlayer.loadVideoData(data);
    };
    
    window.playerCleanup = function() {
        if (window.ytPlayer) {
            window.ytPlayer.destroy();
            window.ytPlayer = null;
        }
    };
    
    window.updateCcStyles = function() {
        if (window.ytPlayer) window.ytPlayer.subtitles.updateCcStyles();
    };
})();
</script>
