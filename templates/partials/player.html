{% include 'partials/player_style.html' %}

<style id="custom-cc-style"></style>

<div class="video-container paused" id="videoContainer">
    <div id="video-skeleton" class="skeleton-loader"></div>
    <div class="buffering-spinner"></div>
    <div class="shortcut-overlay" id="shortcutOverlay"></div>
    
    <video id="vid-player" class="main-video" playsinline preload="auto" crossorigin="anonymous" style="display:none;"></video>
    <audio id="aud-player" preload="auto" style="display:none;"></audio>
    
    <div class="settings-menu cache-menu-popup" id="cacheMenu">
        <div class="settings-panes-wrapper">
            <div class="settings-pane" style="width: 100%;">
                <div class="settings-item" id="downloadCacheBtn">
                    <div class="settings-label">
                        <img src="/static/icons/download.svg" alt="Download">
                        <span>Download to Device</span>
                    </div>
                </div>
                <div class="settings-item" id="removeCacheBtn">
                    <div class="settings-label">
                        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ff4a4a" style="width: 20px; height: 20px;"><path d="M6 19c0 1.1.9 2 2 2h8c1.1 0 2-.9 2-2V7H6v12zM19 4h-3.5l-1-1h-5l-1 1H5v2h14V4z"/></svg>
                        <span style="color: #ff4a4a; font-weight: 500;">Remove from Cache</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- SponsorBlock Menu -->
    <div class="settings-menu sb-menu-popup" id="sbMenu">
        <div class="settings-panes-wrapper" id="sbWrapper">
            <div class="settings-pane" id="sbMainPane"></div>
            <div class="settings-pane" id="sbSubmitPane">
                <div class="submenu-header" id="sbSubmitBackBtn">
                    <img src="/static/icons/chevron-left.svg" alt="Back">
                    <span>Submit Segment</span>
                </div>
                <div id="sbSubmitContent" style="padding: 10px 15px;">
                    <div style="display: flex; flex-direction: column; gap: 10px;">
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 4px 0;">
                            <span style="font-size:13.5px;">Start: <span id="sbSubmitStartTxt" style="font-weight:bold;">0:00</span></span>
                        </div>
                        <div style="display: flex; justify-content: space-between; align-items: center; padding: 4px 0;">
                            <span style="font-size:13.5px;">End: <span id="sbSubmitEndTxt" style="font-weight:bold;">0:00</span></span>
                        </div>
                        <select id="sbSubmitCategory" style="background: #222; color: #fff; border: 1px solid #444; border-radius: 4px; padding: 6px; width: 100%; font-size:13.5px; outline:none; margin-top: 5px;">
                            <option value="sponsor">Sponsor</option>
                            <option value="intro">Intro / Animation</option>
                            <option value="outro">Outro / Credits</option>
                            <option value="interaction">Interaction Reminder</option>
                            <option value="selfpromo">Self Promo</option>
                            <option value="music_offtopic">Non-Music / Off-topic</option>
                            <option value="preview">Preview</option>
                            <option value="poi_highlight">Highlight</option>
                            <option value="filler">Filler Tangent</option>
                        </select>
                        <button id="sbSubmitFinalBtn" class="btn btn-danger" style="width: 100%; margin-top: 5px; justify-content:center;">Submit to API</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- CC Menu -->
    <div class="settings-menu cc-menu-popup" id="ccMenu">
        <div class="settings-panes-wrapper" id="ccWrapper">
            <div class="settings-pane" id="ccMainPane"></div>
            <div class="settings-pane" id="ccSubPane">
                <div class="submenu-header" id="ccSubmenuBackBtn">
                    <img src="/static/icons/chevron-left.svg" alt="Back">
                    <span>Auto-generated</span>
                </div>
                <div id="ccSubmenuContent"></div>
            </div>
            <div class="settings-pane" id="ccOptionsPane">
                <div class="submenu-header" id="ccOptionsBackBtn">
                    <img src="/static/icons/chevron-left.svg" alt="Back">
                    <span>Appearance</span>
                </div>
                <div id="ccOptionsContent" style="padding-bottom: 5px;">
                    <div class="appearance-control">
                        <label>Vertical Offset</label>
                        <div class="appearance-row">
                            <input type="range" id="ccVOffsetInput" class="appearance-slider" min="0" max="100" step="1" value="0">
                            <span id="ccVOffsetVal" class="appearance-val">0%</span>
                        </div>
                    </div>
                    <div class="appearance-control">
                        <label>Font Size Scale</label>
                        <div class="appearance-row">
                            <input type="range" id="ccSizeInput" class="appearance-slider" min="0.5" max="3" step="0.1" value="1.15">
                            <span id="ccSizeVal" class="appearance-val">1.15x</span>
                        </div>
                    </div>
                    <div class="appearance-control">
                        <label>Background Opacity</label>
                        <div class="appearance-row">
                            <input type="range" id="ccOpacityInput" class="appearance-slider" min="0" max="1" step="0.1" value="0.75">
                            <span id="ccOpacityVal" class="appearance-val">75%</span>
                        </div>
                    </div>
                    <div class="appearance-control">
                        <label>Font Family</label>
                        <select id="ccFontSelect" class="appearance-select">
                            {% for font in app_settings.cc_custom_fonts %}
                            <option value="{{ font.value }}">{{ font.name }}</option>
                            {% endfor %}
                        </select>
                    </div>
                    <div class="appearance-control">
                        <label>Font Color</label>
                        <input type="color" id="ccColorInput" class="appearance-color" value="#ffffff">
                    </div>
                    <div class="appearance-control">
                        <label>Background Color</label>
                        <input type="color" id="ccBgInput" class="appearance-color" value="#000000">
                    </div>
                    <div class="appearance-control" style="flex-direction: row; justify-content: space-between; align-items: center; margin-top: 2px; padding: 12px 16px;">
                        <button type="button" id="ccSaveBtn" style="color: #4aff4a; background: none; border: none; cursor: pointer; text-decoration: underline; font-size: 12px; font-weight: bold;">Save Changes</button>
                        <button type="button" id="ccResetBtn" style="color: #ff4a4a; background: none; border: none; cursor: pointer; text-decoration: underline; font-size: 12px;">Reset Defaults</button>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Main Settings Menu -->
    <div class="settings-menu" id="settingsMenu">
        <div class="settings-panes-wrapper" id="settingsWrapper">
            <div class="settings-pane" id="mainPane">
                <div class="settings-item" data-menu="speed">
                    <div class="settings-label">
                        <img src="/static/icons/speed.svg" alt="Speed">
                        <span>Playback speed</span>
                    </div>
                    <div class="settings-value"><span id="lbl-speed">Normal</span> <img src="/static/icons/chevron-right.svg" class="settings-chevron" alt=">"></div>
                </div>
                <div class="settings-item" data-menu="quality">
                    <div class="settings-label">
                        <img src="/static/icons/quality.svg" alt="Quality">
                        <span>Quality</span>
                    </div>
                    <div class="settings-value"><span id="lbl-quality">Loading...</span> <img src="/static/icons/chevron-right.svg" class="settings-chevron" alt=">"></div>
                </div>
            </div>
            <div class="settings-pane" id="subPane">
                <div class="submenu-header" id="submenuBackBtn">
                    <img src="/static/icons/chevron-left.svg" alt="Back">
                    <span id="submenuTitle">Menu</span>
                </div>
                <div id="submenuContent"></div>
            </div>
        </div>
    </div>

    <div class="sb-skip-container" id="sbSkipContainer" style="display: none;">
        <button class="sb-skip-btn" id="sbSkipBtn">
            <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="white" width="18px" height="18px"><path d="M4 18l8.5-6L4 6v12zm9-12v12l8.5-6L13 6z"/></svg>
            Skip Segment (Enter)
        </button>
    </div>

    <div class="controls-container">
        <div class="progress-area" id="progressArea">
            <div class="hover-tooltip" id="hoverTooltip">
                <video id="previewVideo" muted preload="metadata"></video>
                <span id="hoverTime" class="hover-time">0:00</span>
                <span id="hoverChapter" class="hover-chapter"></span>
            </div>
            <div class="progress-track" id="progressTrack">
                <div class="progress-loaded" id="progressLoaded"></div>
                <div class="progress-cached" id="progressCached"></div>
                <div class="progress-sb" id="progressSb"></div>
                <div class="progress-filled" id="progressBar"></div>
                <div class="progress-thumb" id="progressThumb"></div>
            </div>
        </div>
        <div class="controls-row">
            <div class="controls-left">
                <button id="playPauseBtn" title="Play/Pause">
                    <img id="playIcon" src="/static/icons/play.svg" class="control-icon" alt="Play">
                    <img id="pauseIcon" src="/static/icons/pause.svg" class="control-icon" style="display: none;" alt="Pause">
                </button>
                <div class="volume-container">
                    <button id="muteBtn" title="Mute/Unmute">
                        <img id="volHighIcon" src="/static/icons/vol-high.svg" class="control-icon" alt="Vol High">
                        <img id="volLowIcon" src="/static/icons/vol-low.svg" class="control-icon" style="display: none;" alt="Vol Low">
                        <img id="volMutedIcon" src="/static/icons/vol-muted.svg" class="control-icon" style="display: none;" alt="Vol Mute">
                    </button>
                    <input type="range" class="volume-slider" id="volumeSlider" min="0" max="1" step="0.05" value="1">
                </div>
                <div class="time-display"><span id="currentTime">0:00</span> / <span id="duration">0:00</span></div>
            </div>
            <div class="controls-right">
                <button id="cacheBtn" title="Download to Edge Cache">
                    <img src="/static/icons/download.svg" id="cacheIconDefault" class="control-icon" alt="Cache">
                    <img src="/static/icons/cloud-check.svg" id="cacheIconDone" class="control-icon" style="display:none;" alt="Cached">
                </button>
                <button id="sbBtn" title="SponsorBlock">
                    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="#ffffff" class="control-icon" style="width: 26px; height: 26px;"><path d="M12 1L3 5v6c0 5.55 3.84 10.74 9 12 5.16-1.26 9-6.45 9-12V5l-9-4zm0 10.99h7c-.53 4.12-3.28 7.79-7 8.94V12H5V6.3l7-3.11v8.8z"/></svg>
                </button>
                <button id="ccBtn" title="Subtitles/CC" style="display:none;">
                    <img src="/static/icons/cc-outline.svg" id="ccIconOutline" class="control-icon" alt="CC">
                    <img src="/static/icons/cc-filled.svg" id="ccIconFilled" class="control-icon" alt="CC On">
                </button>
                <button id="settingsBtn" title="Settings">
                    <img src="/static/icons/settings.svg" class="control-icon" alt="Settings">
                </button>
                <button id="fullscreenBtn" title="Fullscreen">
                    <img id="fsIconEnter" src="/static/icons/fs-enter.svg" class="control-icon" alt="Enter Fullscreen">
                    <img id="fsIconExit" src="/static/icons/fs-exit.svg" class="control-icon" style="display: none;" alt="Exit Fullscreen">
                </button>
            </div>
        </div>
    </div>
</div>

{% include 'partials/player_script.html' %}
