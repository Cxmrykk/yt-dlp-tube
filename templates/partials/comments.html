{% for comment in comments %}
<div class="comment" id="comment-{{ comment.id }}" data-parent="{{ comment.parent or 'root' }}" style="display: flex; gap: 12px; margin-bottom: 20px;">
    <img src="{{ comment.author_thumbnail or ('https://ui-avatars.com/api/?name=' ~ (comment.author | urlencode) ~ '&background=333&color=fff') }}" style="width: 40px; height: 40px; border-radius: 50%; object-fit: cover; flex-shrink: 0;">
    <div style="min-width: 0; flex: 1;">
        <div style="font-size: 0.9rem; font-weight: bold; margin-bottom: 5px;">
            {{ comment.author }} 
            <span style="color: var(--text-muted); font-size: 0.8rem; font-weight: normal; margin-left: 8px;">
                {{ comment.time_text or '' }}
            </span>
        </div>
        <div style="font-size: 0.95rem; line-height: 1.4; color: #eee; white-space: pre-wrap; word-break: break-word;">{{ comment.text }}</div>
        <div style="margin-top: 5px; font-size: 0.85rem; color: var(--text-muted); display: flex; align-items: center;">
            {% set c_views = comment.like_count | format_views %}
            <svg viewBox="0 0 24 24" width="14" height="14" fill="currentColor" style="margin-right: 6px;"><path d="M1 21h4V9H1v12zm22-11c0-1.1-.9-2-2-2h-6.31l.95-4.57.03-.32c0-.41-.17-.79-.44-1.06L14.17 1 7.59 7.59C7.22 7.95 7 8.45 7 9v10c0 1.1.9 2 2 2h9c.83 0 1.54-.5 1.84-1.22l3.02-7.05c.09-.23.14-.47.14-.73v-2z"/></svg>
            {{ c_views if c_views else '0' }}
        </div>
        
        <details class="replies-box" id="replies-box-{{ comment.id }}" style="display: none; margin-top: 8px;">
            <summary style="cursor: pointer; color: #3ea6ff; font-weight: bold; user-select: none; outline: none; list-style: none; display: flex; align-items: center; gap: 4px;">
                <svg class="reply-icon" viewBox="0 0 24 24" width="18" height="18" fill="currentColor"><path d="M7 10l5 5 5-5z"/></svg>
                <span id="reply-count-{{ comment.id }}">0</span> replies
            </summary>
            <div class="replies" id="replies-container-{{ comment.id }}" style="margin-top: 15px; padding-left: 12px; border-left: 2px solid #333;">
            </div>
        </details>
    </div>
</div>
{% endfor %}
