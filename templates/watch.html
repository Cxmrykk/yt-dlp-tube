{% extends 'base.html' %}

{% block content %}
<link rel="stylesheet" href="/static/css/pages/watch.css">

<div class="watch-layout">
    <div class="main-video-col">
        
        {% include 'partials/player.html' %}
        
        <h1 class="video-title skeleton-box skel-line" id="ui-title" style="width: 75%; height: 2rem;"></h1>
        
        <div class="channel-header">
            <div class="channel-left">
                <a href="#" id="ui-channel-link">
                    <div id="ui-channel-icon" class="skeleton-box skel-circle" style="width: 44px; height: 44px;"></div>
                </a>
                <div style="display: flex; flex-direction: column; gap: 4px; margin-top: 2px;">
                    <a href="#" id="ui-channel-name" class="skeleton-box skel-line" style="width: 140px; margin: 0; display: block;"></a>
                    <span id="ui-channel-subs" class="skeleton-box skel-line" style="width: 90px; margin: 0; height: 0.9rem;"></span>
                </div>
                <button class="btn" id="ui-sub-btn" onclick="window.toggleSubscribe()" style="display:none; margin-left: 10px;">Subscribe</button>
            </div>
            <div id="ui-video-stats" class="skeleton-box" style="width: 180px; height: 28px; border-radius: 8px;"></div>
        </div>

        <div class="desc-box" id="descBox">
            <div class="desc-fade" id="descFade" style="max-height: {{ app_settings.desc_preview_height | default(100) }}px;">
                <div id="ui-desc-label" style="font-weight: bold; margin-bottom: 8px; color: white; display: none;">Description</div>
                <div id="ui-desc" style="white-space: pre-wrap;">
                    <div class="skeleton-box skel-line"></div>
                    <div class="skeleton-box skel-line"></div>
                    <div class="skeleton-box skel-line short"></div>
                </div>
            </div>
        </div>
        
        <div class="comments-section" style="flex-shrink: 0;" id="comments-scroll">
            <div id="ui-comments-header" style="display: none; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">Comments</h3>
                <select id="comment-sort" onchange="window.changeCommentSort()" style="background: #333; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; outline: none; cursor: pointer; font-size: 0.85rem;">
                    <option value="top">Top Comments</option>
                    <option value="new">Newest First</option>
                </select>
            </div>
            <div id="comments-container"></div>
            <div id="comments-sentinel" style="display: flex; gap: 12px; margin-bottom: 20px; opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">
                <div class="skeleton-box skel-circle" style="width: 40px; height: 40px; flex-shrink: 0;"></div>
                <div class="skel-col">
                    <div class="skel-line skeleton-box" style="width: 30%; height: 0.9rem;"></div>
                    <div class="skel-line skeleton-box" style="margin-top: 4px;"></div>
                    <div class="skel-line skeleton-box short"></div>
                </div>
            </div>
        </div>
    </div>

    <div class="suggested-list" id="suggested-scroll">
        <h3 id="ui-upnext-header" style="margin-top: 0; flex-shrink: 0; display: none;">Up Next</h3>
        <div id="suggested-grid" style="display: flex; flex-direction: column; gap: 15px;">
            <div class="s-card" id="suggested-sentinel" style="opacity: 0; pointer-events: none; transition: opacity 0.3s ease;">
                <div class="s-thumb skeleton-box"></div>
                <div class="s-info skel-col">
                    <div class="skel-line skeleton-box title" style="height: 1.2rem;"></div>
                    <div class="skel-line skeleton-box short" style="height: 0.9rem;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    window.WATCH_CONFIG = {
        videoUrl: "{{ video_url | safe }}",
        resumeTime: {{ resume_time | default(0) }}
    };
</script>
<script src="/static/js/pages/watch.js"></script>
{% endblock %}
