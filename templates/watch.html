{% extends 'base.html' %}

{% block content %}
<style>
    .watch-layout { 
        display: grid; grid-template-columns: 1fr 380px; gap: 24px; max-width: 1600px; 
        margin: 0 auto; height: calc(100vh - 104px); 
    }
    @media (max-width: 1100px) { 
        .watch-layout { grid-template-columns: 1fr; height: auto; } 
        .main-video, .suggested-list { height: auto; overflow-y: visible; } 
    }
    
    /* Left Column Context */
    .main-video { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding-right: 10px; }
    .main-video::-webkit-scrollbar { width: 8px; }
    .main-video::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    
    .player-wrapper { width: 100%; background: black; border-radius: 12px; overflow: hidden; margin-bottom: 15px; position: relative; flex-shrink: 0; aspect-ratio: 16/9; }
    video { width: 100%; height: 100%; outline: none; }
    
    /* Loading Skeleton */
    .skeleton-loader { 
        position: absolute; top:0; left:0; width:100%; height:100%; 
        display:flex; align-items:center; justify-content:center; 
        color: var(--text-muted); font-weight: bold; background: #111; 
        z-index: 10;
    }

    .video-title { font-size: 1.4rem; font-weight: bold; margin: 10px 0; color: white; line-height: 1.3; flex-shrink: 0;}
    .channel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; flex-shrink: 0;}
    .channel-left { display: flex; align-items: center; gap: 15px; }
    .channel-left img { width: 40px; height: 40px; border-radius: 50%; object-fit: cover; background: #333;}
    
    .desc-box { 
        background: var(--card-bg); padding: 15px; border-radius: 12px;
        font-size: 0.95rem; line-height: 1.5; color: #ddd; margin-bottom: 25px; flex-shrink: 0;
    }
    
    /* Fixed Double Arrows across all browsers */
    .desc-box summary {
        cursor: pointer; font-weight: bold; color: white; user-select: none; outline: none;
        list-style: none; /* Modern browsers */
    }
    .desc-box summary::-webkit-details-marker { display: none; } /* Safari/Older Chrome */
    .desc-box summary::before { content: '▶ '; font-size: 0.8rem; display: inline-block; transition: transform 0.2s; margin-right: 5px; }
    .desc-box[open] summary::before { transform: rotate(90deg); }

    /* Replies Box Arrow Customization */
    .replies-box summary { list-style: none; }
    .replies-box summary::-webkit-details-marker { display: none; }
    .replies-box summary::before { content: '▾ '; font-size: 1rem; display: inline-block; transition: transform 0.2s; margin-right: 4px; }
    .replies-box[open] summary::before { transform: rotate(180deg); }
    
    /* Right Column Context */
    .suggested-list { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; height: 100%; padding-right: 10px;}
    .suggested-list::-webkit-scrollbar { width: 8px; }
    .suggested-list::-webkit-scrollbar-thumb { background: #444; border-radius: 4px; }
    
    .s-card { display: flex; gap: 10px; text-decoration: none; }
    .s-thumb { width: 160px; min-width: 160px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; position: relative; background: #333;}
    .s-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .s-info { display: flex; flex-direction: column; }
    .s-title { color: white; font-size: 0.95rem; font-weight: 600; line-height: 1.3; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px;}
    .s-channel { color: var(--text-muted); font-size: 0.85rem; }
    
    select { background: #333; color: white; border: none; padding: 8px 12px; border-radius: 20px; font-weight: bold; outline: none; cursor: pointer;}
</style>

<div class="watch-layout">
    <div class="main-video">
        <div class="player-wrapper">
            <div id="video-skeleton" class="skeleton-loader">Fetching video stream...</div>
            <video id="vid-player" controls autoplay style="display:none;"></video>
            <audio id="aud-player" preload="auto" style="display:none;"></audio>
        </div>
        
        <h1 class="video-title" id="ui-title">Loading title...</h1>
        
        <div class="channel-header">
            <div class="channel-left">
                <a href="#" id="ui-channel-link">
                    <img id="ui-channel-icon" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                </a>
                <div>
                    <a href="#" id="ui-channel-name" style="color: white; text-decoration: none; font-weight: bold; font-size: 1.1rem;">
                        Loading...
                    </a>
                    <div id="ui-video-stats" style="color: var(--text-muted); font-size: 0.85rem;"></div>
                </div>
            </div>
            
            <div class="channel-right" style="display: flex; gap: 10px; align-items: center;">
                <select id="quality-selector" onchange="changeResolution(this.value)" style="display:none;"></select>
                
                <form action="/settings" method="POST" style="margin: 0;">
                    <input type="hidden" name="url" id="ui-sub-url" value="">
                    <input type="hidden" name="name" id="ui-sub-name" value="">
                    <input type="hidden" name="action" value="add">
                    <button type="submit" class="btn btn-danger" id="ui-sub-btn" style="display:none;">Subscribe</button>
                </form>
            </div>
        </div>

        <details class="desc-box">
            <summary>Video Description</summary>
            <div id="ui-desc" style="white-space: pre-wrap; margin-top: 15px;">Loading description...</div>
        </details>
        
        <div class="comments-section" style="flex-shrink: 0;" id="comments-scroll">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">Comments</h3>
                <select id="comment-sort" onchange="changeCommentSort()" style="background: #333; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; outline: none; cursor: pointer; font-size: 0.85rem;">
                    <option value="top">Top Comments</option>
                    <option value="new">Newest First</option>
                </select>
            </div>
            <div id="comments-container"></div>
            <div id="comments-loader" style="color: var(--text-muted); font-weight: bold; padding: 10px 0;">Waiting for video data...</div>
        </div>
    </div>

    <div class="suggested-list" id="suggested-scroll">
        <h3 style="margin-top: 0; flex-shrink: 0;">Up Next</h3>
        <div id="suggested-grid" style="display: flex; flex-direction: column; gap: 15px;"></div>
        <div id="suggested-loader" style="text-align: center; padding: 10px; color: var(--text-muted); font-weight: bold;">Waiting for video data...</div>
    </div>
</div>

<script>
    const videoUrl = "{{ video_url }}";
    
    // Globals setup
    const video = document.getElementById('vid-player');
    const audio = document.getElementById('aud-player');
    let isDualAudio = false;
    let resolutionsList = [];

    // --- 1. Main Background Fetch ---
    fetch(`/api/info?url=${encodeURIComponent(videoUrl)}`)
        .then(r => r.json())
        .then(data => {
            if(data.error) {
                document.getElementById('video-skeleton').innerText = "Error: " + data.error;
                return;
            }

            document.getElementById('ui-title').innerText = data.title;
            document.getElementById('ui-channel-name').innerText = data.uploader;
            document.getElementById('ui-channel-name').href = `/channel?url=${encodeURIComponent(data.uploader_url)}`;
            document.getElementById('ui-channel-link').href = `/channel?url=${encodeURIComponent(data.uploader_url)}`;
            
            const fallbackAvatar = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.uploader)}&background=333&color=fff`;
            document.getElementById('ui-channel-icon').src = data.channel_icon || fallbackAvatar;
            
            let stats = [];
            if(data.view_count) stats.push(`${data.view_count} views`);
            if(data.time_ago) stats.push(data.time_ago);
            document.getElementById('ui-video-stats').innerText = stats.join(' • ');

            document.getElementById('ui-desc').innerText = data.description || "No description provided.";
            document.getElementById('ui-sub-url').value = data.uploader_url;
            document.getElementById('ui-sub-name').value = data.uploader;
            document.getElementById('ui-sub-btn').style.display = 'inline-block';

            initializePlayer(data);

            // Unlock secondary loaders
            suggestedQuery = data.search_query || data.id;
            suggObserver.observe(document.getElementById('suggested-loader'));
            commentsObserver.observe(document.getElementById('comments-loader'));
        })
        .catch(err => {
            document.getElementById('video-skeleton').innerText = "Failed to fetch video data.";
        });


    // --- 2. Player Logic ---
    function initializePlayer(data) {
        resolutionsList = data.resolutions;
        
        let targetRes = localStorage.getItem('prefRes') || 'auto';
        if (targetRes === 'auto') {
            targetRes = window.screen.height * window.devicePixelRatio;
        } else {
            targetRes = parseInt(targetRes, 10);
        }
        
        let selectedUrl = '';
        if (resolutionsList && resolutionsList.length > 0) {
            let bestMatch = resolutionsList[resolutionsList.length - 1]; // Fallback smallest
            const qSelect = document.getElementById('quality-selector');
            
            for (let r of resolutionsList) {
                const opt = document.createElement('option');
                opt.value = r.url;
                opt.innerText = `${r.height}p${r.fps > 30 ? ' ' + r.fps + 'fps' : ''}`;
                qSelect.appendChild(opt);

                // Add break so we lock in on the highest acceptable resolution
                if (r.height <= targetRes) {
                    bestMatch = r;
                    break;
                }
            }
            
            selectedUrl = bestMatch.url;
            isDualAudio = !bestMatch.has_audio;
            qSelect.value = selectedUrl;
            qSelect.style.display = 'inline-block';
        }

        if (data.best_audio) {
            audio.src = data.best_audio;
        } else {
            isDualAudio = false; 
        }

        video.src = selectedUrl;
        document.getElementById('video-skeleton').style.display = 'none';
        video.style.display = 'block';

        if (isDualAudio) {
            video.onplay = () => { audio.currentTime = video.currentTime; audio.play(); };
            video.onpause = () => { audio.pause(); };
            video.onseeking = () => { audio.currentTime = video.currentTime; };
            video.onseeked = () => { audio.currentTime = video.currentTime; };
            video.onwaiting = () => { audio.pause(); };
            video.onplaying = () => { audio.play(); };
            video.ontimeupdate = () => {
                if (Math.abs(audio.currentTime - video.currentTime) > 0.2) {
                    audio.currentTime = video.currentTime;
                }
            };
            video.onratechange = () => { audio.playbackRate = video.playbackRate; };
            video.onvolumechange = () => { 
                audio.volume = video.volume; 
                audio.muted = video.muted;
            };
        }
    }

    function changeResolution(url) {
        const resObj = resolutionsList.find(r => r.url === url);
        isDualAudio = resObj ? !resObj.has_audio : false;
        
        const currentTime = video.currentTime;
        const isPaused = video.paused;
        video.src = url;
        video.currentTime = currentTime;
        
        if (isDualAudio) {
            audio.currentTime = currentTime;
            audio.muted = video.muted;
            audio.volume = video.volume;
        } else {
            audio.pause();
        }
        
        if (!isPaused) video.play();
    }


    // --- 3. Suggested & Comments Infinite Scrollers ---
    
    // Suggested Videos
    let suggestedPage = 0; 
    let suggestedLoading = false;
    let suggestedQuery = "";
    
    function loadSuggestedVideos() {
        if (!suggestedQuery) return;
        suggestedLoading = true;
        suggestedPage++;
        document.getElementById('suggested-loader').innerText = 'Loading suggested...';
        
        fetch(`/api/videos?type=suggested&query=${encodeURIComponent(suggestedQuery)}&page=${suggestedPage}`)
            .then(r => r.text())
            .then(html => {
                if(html.trim() !== '') {
                    document.getElementById('suggested-grid').insertAdjacentHTML('beforeend', html);
                    suggestedLoading = false;
                    document.getElementById('suggested-loader').innerText = 'Scroll for more';
                    
                    setTimeout(() => {
                        if (!suggestedLoading) {
                            const loader = document.getElementById('suggested-loader');
                            const scrollArea = document.getElementById('suggested-scroll');
                            if (loader.getBoundingClientRect().top <= scrollArea.getBoundingClientRect().bottom + 200) {
                                loadSuggestedVideos();
                            }
                        }
                    }, 100);
                } else {
                    document.getElementById('suggested-loader').innerText = "No more videos";
                }
            });
    }

    const suggObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !suggestedLoading && suggestedQuery) {
            loadSuggestedVideos();
        }
    }, { root: document.getElementById('suggested-scroll'), rootMargin: "200px" });

    // Comments Scroller
    let commentsPage = 1;
    let commentsLoading = false;
    let commentsFinished = false;

    // Triggered when the dropdown is changed
    function changeCommentSort() {
        commentsPage = 1;
        commentsFinished = false;
        commentsLoading = false;
        document.getElementById('comments-container').innerHTML = '';
        loadComments();
    }

    function loadComments() {
        if (commentsFinished) return;
        commentsLoading = true;
        document.getElementById('comments-loader').innerText = (commentsPage === 1) ? 'Extracting comments (may take a moment)...' : 'Loading more comments...';
        
        const sortMode = document.getElementById('comment-sort').value;
        
        fetch(`/api/comments?url=${encodeURIComponent(videoUrl)}&page=${commentsPage}&sort=${sortMode}`)
            .then(r => {
                if (!r.ok) throw new Error("Server Error");
                return r.text();
            })
            .then(html => {
                if (html.trim() !== '') {
                    document.getElementById('comments-container').insertAdjacentHTML('beforeend', html);
                    commentsPage++;
                    commentsLoading = false;
                    document.getElementById('comments-loader').innerText = 'Scroll for more comments';
                } else {
                    commentsFinished = true;
                    document.getElementById('comments-loader').innerText = (commentsPage === 1) ? '' : 'No more comments';
                }
            })
            .catch(err => {
                commentsLoading = false;
                document.getElementById('comments-loader').innerText = 'Failed to load comments.';
            });
    }

    const commentsObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !commentsLoading && !commentsFinished && suggestedQuery) {
            loadComments();
        }
    }, { rootMargin: "200px" });
</script>
{% endblock %}
