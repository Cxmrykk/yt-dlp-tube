{% extends 'base.html' %}

{% block content %}
<style>
    .watch-layout { display: grid; grid-template-columns: 1fr 380px; gap: 24px; max-width: 1600px; margin: 0 auto; height: calc(100vh - 104px); }
    @media (max-width: 1100px) { .watch-layout { grid-template-columns: 1fr; height: auto; } .main-video-col, .suggested-list { height: auto; overflow-y: visible; } }
    
    .main-video-col { display: flex; flex-direction: column; height: 100%; overflow-y: auto; padding-right: 10px; }
    
    .video-title { font-size: 1.4rem; font-weight: bold; margin: 10px 0; color: white; line-height: 1.3; flex-shrink: 0;}
    .channel-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 15px; flex-shrink: 0; flex-wrap: wrap; gap: 10px;}
    .channel-left { display: flex; align-items: center; gap: 15px; }
    .channel-left img { width: 44px; height: 44px; border-radius: 50%; object-fit: cover; background: #333;}
    
    .desc-box { 
        background: var(--card-bg); padding: 15px; border-radius: 12px;
        font-size: 0.95rem; line-height: 1.5; color: #ddd; margin-bottom: 25px; flex-shrink: 0;
        transition: background 0.2s;
    }
    .desc-box:hover { background: #222; }
    .desc-fade { overflow: hidden; position: relative; }
    .desc-box.expanded .desc-fade {
        max-height: none !important;
        -webkit-mask-image: none !important;
        mask-image: none !important;
    }
    
    .replies-box summary { cursor: pointer; color: #3ea6ff; font-weight: bold; user-select: none; outline: none; list-style: none; display: flex; align-items: center; gap: 4px; }
    .replies-box summary::-webkit-details-marker { display: none; }
    .replies-box .reply-icon { transition: transform 0.2s; }
    .replies-box[open] .reply-icon { transform: rotate(180deg); }
    
    .suggested-list { display: flex; flex-direction: column; gap: 15px; overflow-y: auto; height: 100%; padding-right: 10px;}
    
    .s-card { display: flex; gap: 10px; text-decoration: none; }
    .s-thumb { width: 160px; min-width: 160px; aspect-ratio: 16/9; border-radius: 8px; overflow: hidden; position: relative; background: #333;}
    .s-thumb img { width: 100%; height: 100%; object-fit: cover; }
    .s-info { display: flex; flex-direction: column; }
    .s-title { 
        color: white; font-size: 0.95rem; font-weight: 600; line-height: 1.3; 
        height: 2.6em;
        display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; margin-bottom: 5px;
    }
    .s-channel { color: var(--text-muted); font-size: 0.85rem; }

    .marquee-wrapper { width: 100%; overflow: hidden; display: flex; align-items: center; }
    .marquee-text { display: block; white-space: nowrap; transition: transform 0.2s ease-out; }
    .marquee-wrapper:not(.scrolling) .marquee-text { width: 100%; overflow: hidden; text-overflow: ellipsis; }
    .marquee-wrapper.scrolling .marquee-text { width: auto; text-overflow: clip; padding-right: 10px; }
</style>

<div class="watch-layout">
    <div class="main-video-col">
        
        {% include 'partials/player.html' %}
        
        <h1 class="video-title" id="ui-title">Loading title...</h1>
        
        <div class="channel-header">
            <div class="channel-left">
                <a href="#" id="ui-channel-link">
                    <img id="ui-channel-icon" src="data:image/gif;base64,R0lGODlhAQABAAD/ACwAAAAAAQABAAACADs=">
                </a>
                <div style="display: flex; flex-direction: column;">
                    <a href="#" id="ui-channel-name" style="color: white; text-decoration: none; font-weight: bold; font-size: 1.1rem; line-height: 1.2;">
                        Loading...
                    </a>
                    <span id="ui-channel-subs" style="color: var(--text-muted); font-size: 0.85rem;"></span>
                </div>
                <button class="btn" id="ui-sub-btn" onclick="window.toggleSubscribe()" style="display:none; margin-left: 10px;">Subscribe</button>
            </div>
            <div id="ui-video-stats" style="color: var(--text-muted); font-size: 0.95rem; font-weight: 500; background: #222; padding: 6px 12px; border-radius: 8px;"></div>
        </div>

        <div class="desc-box" id="descBox">
            <div class="desc-fade" id="descFade" style="max-height: {{ app_settings.desc_preview_height | default(100) }}px;">
                <div style="font-weight: bold; margin-bottom: 8px; color: white;">Description</div>
                <div id="ui-desc" style="white-space: pre-wrap;">Loading description...</div>
            </div>
        </div>
        
        <div class="comments-section" style="flex-shrink: 0;" id="comments-scroll">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px;">
                <h3 style="margin: 0;">Comments</h3>
                <select id="comment-sort" onchange="window.changeCommentSort()" style="background: #333; color: white; border: none; padding: 6px 12px; border-radius: 20px; font-weight: bold; outline: none; cursor: pointer; font-size: 0.85rem;">
                    <option value="top">Top Comments</option>
                    <option value="new">Newest First</option>
                </select>
            </div>
            <div id="comments-container"></div>
            <div id="comments-loader" style="color: var(--text-muted); font-weight: bold; padding: 10px 0;">Waiting for video data...</div>
        </div>
    </div>

    <div class="suggested-list" id="suggested-scroll">
        <h3 style="margin-top: 0; flex-shrink: 0;">Up Next</h3>
        <div id="suggested-grid" style="display: flex; flex-direction: column; gap: 15px;"></div>
        <div id="suggested-loader" style="text-align: center; padding: 10px; color: var(--text-muted); font-weight: bold;">Waiting for video data...</div>
    </div>
</div>

<script>
(function() {
    const videoUrl = "{{ video_url }}";
    window.resumeTime = {{ resume_time | default(0) }};
    let currentChannel = {};
    const checkIcon = `<img src="/static/icons/check.svg" style="width: 18px; height: 18px; margin-left: 4px;" alt="Subscribed">`;

    function getImgProxyUrl(url) {
        if(!url) return '';
        if(url.startsWith('/proxy/') || url.startsWith('data:')) return url;
        return `/proxy/image?url=${encodeURIComponent(url)}`;
    }

    function initDescription() {
        const fade = document.getElementById('descFade');
        if (fade.scrollHeight <= fade.clientHeight + 2) {
            fade.style.webkitMaskImage = 'none';
            fade.style.maskImage = 'none';
            fade.parentElement.style.cursor = 'auto';
            fade.parentElement.onclick = null;
        } else {
            fade.style.webkitMaskImage = 'linear-gradient(to bottom, black calc(100% - 40px), transparent 100%)';
            fade.style.maskImage = 'linear-gradient(to bottom, black calc(100% - 40px), transparent 100%)';
            fade.parentElement.style.cursor = 'pointer';
            fade.parentElement.onclick = function() { this.classList.toggle('expanded'); };
        }
    }

    function getRelativeYtUrl(fullUrl) {
        if(!fullUrl) return fullUrl;
        try {
            let u = new URL(fullUrl);
            if (u.hostname.includes('youtu.be')) return '/watch?v=' + u.pathname.substring(1);
            if (u.hostname.includes('youtube.com')) return u.pathname + u.search;
        } catch(e) {}
        return fullUrl;
    }

    let suggestedPage = 0; let suggestedLoading = false; let suggestedQuery = ""; let currentVideoId = "";

    window.appFetch(`/api/info?url=${encodeURIComponent(videoUrl)}`)
        .then(r => r.json())
        .then(data => {
            if(data.error) {
                document.getElementById('video-skeleton').innerText = "Error: " + data.error;
                return;
            }

            document.getElementById('ui-title').innerText = data.title;
            document.getElementById('ui-channel-name').innerText = data.uploader;
            document.getElementById('ui-channel-name').href = getRelativeYtUrl(data.uploader_url);
            document.getElementById('ui-channel-link').href = getRelativeYtUrl(data.uploader_url);
            
            if (data.subscriber_count) {
                document.getElementById('ui-channel-subs').innerText = data.subscriber_count + ' subscribers';
            }
            
            const rawFallback = `https://ui-avatars.com/api/?name=${encodeURIComponent(data.uploader)}&background=333&color=fff`;
            document.getElementById('ui-channel-icon').src = getImgProxyUrl(data.channel_icon || rawFallback);
            currentChannel = { url: data.uploader_url, name: data.uploader, icon: data.channel_icon || rawFallback };
            
            updateSubButton(data.is_subbed);
            
            if (!data.channel_icon) {
                window.appFetch(`/api/channel_info?url=${encodeURIComponent(data.uploader_url)}`)
                    .then(r => r.json())
                    .then(cData => {
                        if (cData.icon) {
                            document.getElementById('ui-channel-icon').src = getImgProxyUrl(cData.icon);
                            currentChannel.icon = cData.icon; 
                        }
                    }).catch(e => { if (e.name !== 'AbortError') console.error("Icon fetch failed:", e); });
            }
            
            let stats = [];
            if(data.view_count) stats.push(`${data.view_count} views`);
            if(data.time_ago) stats.push(data.time_ago);
            document.getElementById('ui-video-stats').innerText = stats.join(' • ');

            document.getElementById('ui-desc').innerText = data.description || "No description provided.";
            initDescription();

            if (typeof window.initializePlayer === 'function') window.initializePlayer(data);

            suggestedQuery = data.search_query || data.id;
            currentVideoId = data.id;
            
            suggObserver.observe(document.getElementById('suggested-loader'));
            commentsObserver.observe(document.getElementById('comments-loader'));

            // Preload comments and suggested immediately instead of waiting for scroll
            if (!suggestedLoading) loadSuggestedVideos();
            if (!commentsLoading && !commentsFinished) loadComments();

            let watchSessionTime = 0;
            let lastHistoryPing = 0;
            if (window.historyInterval) clearInterval(window.historyInterval);
            window.historyInterval = setInterval(() => {
                if (window.mainVideo && !window.mainVideo.paused && !window.isScrubbing && window.mainVideo.readyState >= 3) {
                    watchSessionTime++;
                    if (watchSessionTime - lastHistoryPing >= 10) {
                        lastHistoryPing = watchSessionTime;
                        const th_url = `https://i.ytimg.com/vi/${data.id}/hqdefault.jpg`;
                        
                        window.appFetch('/api/history/update', {
                            method: 'POST',
                            headers: {'Content-Type': 'application/json'},
                            body: JSON.stringify({
                                id: data.id,
                                title: data.title,
                                uploader: data.uploader,
                                uploader_url: data.uploader_url,
                                channel_icon: currentChannel.icon,
                                thumbnail: th_url,
                                duration: (window.mainVideo.duration && isFinite(window.mainVideo.duration)) ? window.mainVideo.duration : (data.duration || 0),
                                watch_time_increment: 10
                            })
                        }).catch(()=>{});
                    }
                }
            }, 1000);
        })
        .catch(err => {
            if (err.name === 'AbortError') return;
            document.getElementById('video-skeleton').innerText = "Failed to fetch video data.";
        });

    function updateSubButton(isSubbed) {
        const btn = document.getElementById('ui-sub-btn');
        btn.style.display = 'inline-flex';
        if (isSubbed) {
            btn.className = 'btn'; btn.innerHTML = 'Subscribed ' + checkIcon;
        } else {
            btn.className = 'btn btn-danger'; btn.innerHTML = 'Subscribe';
        }
        btn.dataset.subbed = isSubbed;
    }

    window.toggleSubscribe = function() {
        const btn = document.getElementById('ui-sub-btn');
        const isSubbed = btn.dataset.subbed === 'true';
        btn.innerHTML = 'Saving...';
        
        window.appFetch('/api/toggle_sub', {
            method: 'POST', headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(currentChannel)
        }).then(r => r.json()).then(res => {
            updateSubButton(res.is_subbed);
        }).catch(err => {
            if (err.name === 'AbortError') return;
            alert("Error toggling subscription");
            updateSubButton(isSubbed);
        });
    }

    function revealStaggeredSuggested() {
        const unrevealed = document.querySelectorAll('#suggested-grid .unrevealed');
        unrevealed.forEach((card, index) => {
            setTimeout(() => {
                if (window.pageAbortController && window.pageAbortController.signal.aborted) return;
                card.classList.remove('unrevealed');
                card.classList.add('reveal-anim');
            }, index * 80);
        });
    }
    
    function loadSuggestedVideos() {
        if (!suggestedQuery) return;
        suggestedLoading = true; suggestedPage++;
        document.getElementById('suggested-loader').innerText = 'Loading suggested...';
        
        window.appFetch(`/api/videos?type=suggested&query=${encodeURIComponent(suggestedQuery)}&page=${suggestedPage}&current_id=${encodeURIComponent(currentVideoId)}`)
            .then(r => r.text())
            .then(html => {
                if(html.trim() !== '') {
                    document.getElementById('suggested-grid').insertAdjacentHTML('beforeend', html);
                    revealStaggeredSuggested();
                    suggestedLoading = false;
                    document.getElementById('suggested-loader').innerText = 'Scroll for more';
                    setTimeout(() => {
                        if (!suggestedLoading && !window.pageAbortController.signal.aborted) {
                            const loader = document.getElementById('suggested-loader');
                            const scrollArea = document.getElementById('suggested-scroll');
                            if (loader.getBoundingClientRect().top <= scrollArea.getBoundingClientRect().bottom + 200) loadSuggestedVideos();
                        }
                    }, 100);
                } else { 
                    document.getElementById('suggested-loader').style.display = "none"; 
                    const endCard = `
                    <div class="s-card unrevealed" style="cursor: default;">
                        <div class="s-thumb" style="background: transparent; border: 2px dashed #333; display: flex; flex-direction: column; align-items: center; justify-content: center;">
                            <img src="/static/icons/no-more.svg" style="width: 32px; height: 32px;" alt="No more">
                        </div>
                    </div>`;
                    document.getElementById('suggested-grid').insertAdjacentHTML('beforeend', endCard);
                    revealStaggeredSuggested();
                }
            }).catch(err => { if(err.name === 'AbortError') return; });
    }

    const suggObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !suggestedLoading && suggestedQuery) loadSuggestedVideos();
    }, { root: document.getElementById('suggested-scroll'), rootMargin: "200px" });

    let commentsPage = 1; let commentsLoading = false; let commentsFinished = false;
    window.commentThreadMap = window.commentThreadMap || {};

    window.changeCommentSort = function() {
        commentsPage = 1; commentsFinished = false; commentsLoading = false;
        window.commentThreadMap = {};
        document.getElementById('comments-container').innerHTML = ''; loadComments();
    }

    function loadComments() {
        if (commentsFinished) return;
        commentsLoading = true;
        document.getElementById('comments-loader').innerText = (commentsPage === 1) ? 'Extracting comments...' : 'Loading more...';
        const sortMode = document.getElementById('comment-sort').value;
        
        window.appFetch(`/api/comments?url=${encodeURIComponent(videoUrl)}&page=${commentsPage}&sort=${sortMode}`)
            .then(r => { if (!r.ok) throw new Error("Server Error"); return r.text(); })
            .then(html => {
                if (html.trim() !== '') {
                    const temp = document.createElement('div');
                    temp.innerHTML = html;
                    
                    const comments = Array.from(temp.querySelectorAll('.comment'));
                    
                    comments.forEach(c => {
                        const pId = c.getAttribute('data-parent');
                        if (!pId || pId === 'root' || pId === 'None') {
                            const cId = c.id.replace('comment-', '');
                            window.commentThreadMap[cId] = cId;
                        }
                    });

                    comments.forEach(comment => {
                        const cId = comment.id.replace('comment-', '');
                        let parentId = comment.getAttribute('data-parent');
                        
                        if (parentId && parentId !== 'root' && parentId !== 'None') {
                            let rootId = parentId;
                            let maxDepth = 10;
                            
                            while (maxDepth > 0) {
                                if (window.commentThreadMap[rootId] === rootId) break;
                                if (window.commentThreadMap[rootId]) {
                                    rootId = window.commentThreadMap[rootId];
                                    continue;
                                }
                                
                                let el = document.getElementById('comment-' + rootId) || temp.querySelector('#comment-' + rootId);
                                if (el) {
                                    let nextP = el.getAttribute('data-parent');
                                    if (nextP && nextP !== 'root' && nextP !== 'None') {
                                        rootId = nextP;
                                    } else {
                                        window.commentThreadMap[rootId] = rootId;
                                        break;
                                    }
                                } else {
                                    break;
                                }
                                maxDepth--;
                            }
                            
                            window.commentThreadMap[cId] = rootId; 

                            const parentBox = document.getElementById('replies-box-' + rootId) || temp.querySelector('#replies-box-' + rootId);
                            const parentContainer = document.getElementById('replies-container-' + rootId) || temp.querySelector('#replies-container-' + rootId);
                            const countEl = document.getElementById('reply-count-' + rootId) || temp.querySelector('#reply-count-' + rootId);
                            
                            if (parentContainer) {
                                comment.style.marginBottom = '12px';
                                comment.style.marginTop = '10px';
                                const img = comment.querySelector('img');
                                if (img) { img.style.width = '28px'; img.style.height = '28px'; }
                                
                                parentContainer.appendChild(comment);
                                if (parentBox) parentBox.style.display = 'block';
                                if (countEl) countEl.innerText = (parseInt(countEl.innerText) || 0) + 1;
                            } else {
                                document.getElementById('comments-container').appendChild(comment);
                            }
                        }
                    });
                    
                    Array.from(temp.children).forEach(child => {
                        document.getElementById('comments-container').appendChild(child);
                    });

                    commentsPage++; commentsLoading = false;
                    document.getElementById('comments-loader').innerText = 'Scroll for more comments';
                } else {
                    commentsFinished = true;
                    document.getElementById('comments-loader').innerText = (commentsPage === 1) ? '' : 'No more comments';
                }
            }).catch(err => {
                if(err.name === 'AbortError') return;
                commentsLoading = false; document.getElementById('comments-loader').innerText = 'Failed to load comments.';
            });
    }

    const commentsObserver = new IntersectionObserver((entries) => {
        if (entries[0].isIntersecting && !commentsLoading && !commentsFinished && suggestedQuery) loadComments();
    }, { rootMargin: "200px" });

    const handleCardHover = (e) => {
        const card = e.target.closest('.s-card');
        if (card && !card.dataset.hoverSetup) {
            card.dataset.hoverSetup = 'true';
            
            card.addEventListener('mouseenter', function() {
                const wrapper = this.querySelector('.marquee-wrapper');
                const text = this.querySelector('.marquee-text');
                if (!wrapper || !text) return;
                
                wrapper.classList.add('scrolling');
                const dist = text.scrollWidth - wrapper.clientWidth;
                
                if (dist > 0) {
                    const duration = Math.max(1.5, dist / 30);
                    text.style.transition = `transform ${duration}s linear`;
                    text.style.transform = `translateX(-${dist}px)`;
                } else {
                    wrapper.classList.remove('scrolling');
                }
            });
            
            card.addEventListener('mouseleave', function() {
                const wrapper = this.querySelector('.marquee-wrapper');
                const text = this.querySelector('.marquee-text');
                if (!wrapper || !text) return;
                
                text.style.transition = 'none';
                text.style.transform = 'translateX(0)';
                wrapper.classList.remove('scrolling');
            });
            
            card.dispatchEvent(new Event('mouseenter'));
        }
    };
    document.addEventListener('mouseover', handleCardHover);

    // Coordinate with global PJAX architecture
    window.pageTeardown = function() {
        if (window.historyInterval) clearInterval(window.historyInterval);
        suggObserver.disconnect();
        commentsObserver.disconnect();
        document.removeEventListener('mouseover', handleCardHover);
        
        // Execute player's underlying teardown hooks
        if (typeof window.playerCleanup === 'function') window.playerCleanup();
    };
})();
</script>
{% endblock %}
